name: Azure Machine Learning
description: >-
  Azure Machine Learning is an enterprise-grade cloud service for building,
  training, deploying, and managing machine learning models. It supports the
  full ML lifecycle including data preparation, model training, evaluation,
  deployment, and monitoring with MLOps capabilities.
